# YARN ResourceManager Application Summary
appender.RMSUMMARY.type = RollingFile
appender.RMSUMMARY.name = RMSUMMARY
appender.RMSUMMARY.fileName = ${env:LOG_DIR:-/logs}/${sys:yarn.server.resourcemanager.appsummary.log.file:-rm-appsummary.log}
appender.RMSUMMARY.filePattern = ${env:LOG_DIR:-/logs}/${sys:yarn.server.resourcemanager.appsummary.log.file:-rm-appsummary.log}.%i
appender.RMSUMMARY.layout.type = PatternLayout
appender.RMSUMMARY.layout.pattern = [${sys:log4j.hostname:-unknown}][Audit][RMSUMMARY] %d{ISO8601} %p %c{2}: %m%n
appender.RMSUMMARY.policies.type = Policies
appender.RMSUMMARY.policies.size.type = SizeBasedTriggeringPolicy
appender.RMSUMMARY.policies.size.size = 256MB
appender.RMSUMMARY.strategy.type = DefaultRolloverStrategy
appender.RMSUMMARY.strategy.max = 20

logger.rmsummary.name = org.apache.hadoop.yarn.server.resourcemanager.RMAppManager$ApplicationSummary
logger.rmsummary.level = ${sys:yarn.server.resourcemanager.appsummary.logger:-INFO}
logger.rmsummary.appenderRef.RMSUMMARY.ref = RMSUMMARY
logger.rmsummary.additivity = false

