status = info
name = HadoopLogging

# Root logger: send to both console and rolling file so docker logs and files match
rootLogger.level = info
rootLogger.appenderRef.console.ref = CONSOLE
rootLogger.appenderRef.RFA.ref = RFA

############################
# Appenders
############################

# Console appender (stdout / stderr)
appender.CONSOLE.type = Console
appender.CONSOLE.name = CONSOLE
appender.CONSOLE.target = SYSTEM_ERR
appender.CONSOLE.layout.type = PatternLayout
appender.CONSOLE.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}${env:LOG_TAG_ACTION:-}${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n

# Rolling file appender for general daemon logs
appender.RFA.type = RollingFile
appender.RFA.name = RFA
appender.RFA.fileName = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}
appender.RFA.filePattern = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}.%i
appender.RFA.layout.type = PatternLayout
appender.RFA.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}${env:LOG_TAG_ACTION:-}${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c: %m%n
appender.RFA.policies.type = Policies
appender.RFA.policies.size.type = SizeBasedTriggeringPolicy
appender.RFA.policies.size.size = ${sys:hadoop.log.maxfilesize:-256MB}
appender.RFA.strategy.type = DefaultRolloverStrategy
appender.RFA.strategy.max = ${sys:hadoop.log.maxbackupindex:-20}

# HDFS audit log
appender.RFAAUDIT.type = RollingFile
appender.RFAAUDIT.name = RFAAUDIT
appender.RFAAUDIT.fileName = ${env:LOG_DIR:-/logs}/hdfs-audit-${sys:log4j.hostname:-unknown}.log
appender.RFAAUDIT.filePattern = ${env:LOG_DIR:-/logs}/hdfs-audit-${sys:log4j.hostname:-unknown}.log.%i
appender.RFAAUDIT.layout.type = PatternLayout
appender.RFAAUDIT.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Audit]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.RFAAUDIT.policies.type = Policies
appender.RFAAUDIT.policies.size.type = SizeBasedTriggeringPolicy
appender.RFAAUDIT.policies.size.size = ${sys:hdfs.audit.log.maxfilesize:-256MB}
appender.RFAAUDIT.strategy.type = DefaultRolloverStrategy
appender.RFAAUDIT.strategy.max = ${sys:hdfs.audit.log.maxbackupindex:-20}

# YARN ResourceManager audit log
appender.RMAUDIT.type = RollingFile
appender.RMAUDIT.name = RMAUDIT
appender.RMAUDIT.fileName = ${env:LOG_DIR:-/logs}/rm-audit.log
appender.RMAUDIT.filePattern = ${env:LOG_DIR:-/logs}/rm-audit.log.%i
appender.RMAUDIT.layout.type = PatternLayout
appender.RMAUDIT.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Audit]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.RMAUDIT.policies.type = Policies
appender.RMAUDIT.policies.size.type = SizeBasedTriggeringPolicy
appender.RMAUDIT.policies.size.size = ${sys:rm.audit.log.maxfilesize:-256MB}
appender.RMAUDIT.strategy.type = DefaultRolloverStrategy
appender.RMAUDIT.strategy.max = ${sys:rm.audit.log.maxbackupindex:-20}

# YARN NodeManager audit log
appender.NMAUDIT.type = RollingFile
appender.NMAUDIT.name = NMAUDIT
appender.NMAUDIT.fileName = ${env:LOG_DIR:-/logs}/nm-audit.log
appender.NMAUDIT.filePattern = ${env:LOG_DIR:-/logs}/nm-audit.log.%i
appender.NMAUDIT.layout.type = PatternLayout
appender.NMAUDIT.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Audit]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.NMAUDIT.policies.type = Policies
appender.NMAUDIT.policies.size.type = SizeBasedTriggeringPolicy
appender.NMAUDIT.policies.size.size = ${sys:nm.audit.log.maxfilesize:-256MB}
appender.NMAUDIT.strategy.type = DefaultRolloverStrategy
appender.NMAUDIT.strategy.max = ${sys:nm.audit.log.maxbackupindex:-20}

# MapReduce JobHistory audit log
appender.HSAUDIT.type = RollingFile
appender.HSAUDIT.name = HSAUDIT
appender.HSAUDIT.fileName = ${env:LOG_DIR:-/logs}/hs-audit.log
appender.HSAUDIT.filePattern = ${env:LOG_DIR:-/logs}/hs-audit-%d{yyyy-MM-dd}.log
appender.HSAUDIT.layout.type = PatternLayout
appender.HSAUDIT.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Audit]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.HSAUDIT.policies.type = Policies
appender.HSAUDIT.policies.time.type = TimeBasedTriggeringPolicy
appender.HSAUDIT.policies.time.interval = 1

# HTTP access logs (Jetty) for various services
appender.AccessNN.type = RollingFile
appender.AccessNN.name = AccessNN
appender.AccessNN.fileName = ${env:LOG_DIR:-/logs}/jetty-namenode.log
appender.AccessNN.filePattern = ${env:LOG_DIR:-/logs}/jetty-namenode-%d{yyyy-MM-dd}.log
appender.AccessNN.layout.type = PatternLayout
appender.AccessNN.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Access]${env:LOG_TAG_ACTION:-}${env:LOG_TAG_CUSTOM:-} %m%n
appender.AccessNN.policies.type = Policies
appender.AccessNN.policies.time.type = TimeBasedTriggeringPolicy
appender.AccessNN.policies.time.interval = 1

appender.AccessDN.type = RollingFile
appender.AccessDN.name = AccessDN
appender.AccessDN.fileName = ${env:LOG_DIR:-/logs}/jetty-datanode.log
appender.AccessDN.filePattern = ${env:LOG_DIR:-/logs}/jetty-datanode-%d{yyyy-MM-dd}.log
appender.AccessDN.layout.type = PatternLayout
appender.AccessDN.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Access]${env:LOG_TAG_ACTION:-}${env:LOG_TAG_CUSTOM:-} %m%n
appender.AccessDN.policies.type = Policies
appender.AccessDN.policies.time.type = TimeBasedTriggeringPolicy
appender.AccessDN.policies.time.interval = 1

appender.AccessRM.type = RollingFile
appender.AccessRM.name = AccessRM
appender.AccessRM.fileName = ${env:LOG_DIR:-/logs}/jetty-resourcemanager.log
appender.AccessRM.filePattern = ${env:LOG_DIR:-/logs}/jetty-resourcemanager-%d{yyyy-MM-dd}.log
appender.AccessRM.layout.type = PatternLayout
appender.AccessRM.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Access]${env:LOG_TAG_ACTION:-}${env:LOG_TAG_CUSTOM:-} %m%n
appender.AccessRM.policies.type = Policies
appender.AccessRM.policies.time.type = TimeBasedTriggeringPolicy
appender.AccessRM.policies.time.interval = 1

appender.AccessJH.type = RollingFile
appender.AccessJH.name = AccessJH
appender.AccessJH.fileName = ${env:LOG_DIR:-/logs}/jetty-jobhistory.log
appender.AccessJH.filePattern = ${env:LOG_DIR:-/logs}/jetty-jobhistory-%d{yyyy-MM-dd}.log
appender.AccessJH.layout.type = PatternLayout
appender.AccessJH.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Access]${env:LOG_TAG_ACTION:-}${env:LOG_TAG_CUSTOM:-} %m%n
appender.AccessJH.policies.type = Policies
appender.AccessJH.policies.time.type = TimeBasedTriggeringPolicy
appender.AccessJH.policies.time.interval = 1

appender.AccessNM.type = RollingFile
appender.AccessNM.name = AccessNM
appender.AccessNM.fileName = ${env:LOG_DIR:-/logs}/jetty-nodemanager.log
appender.AccessNM.filePattern = ${env:LOG_DIR:-/logs}/jetty-nodemanager-%d{yyyy-MM-dd}.log
appender.AccessNM.layout.type = PatternLayout
appender.AccessNM.layout.pattern = [${sys:log4j.hostname:-unknown}]${env:LOG_TAG_APPLICATION:-}[Access]${env:LOG_TAG_ACTION:-}${env:LOG_TAG_CUSTOM:-} %m%n
appender.AccessNM.policies.type = Policies
appender.AccessNM.policies.time.type = TimeBasedTriggeringPolicy
appender.AccessNM.policies.time.interval = 1

############################
# Loggers
############################

# HDFS audit
logger.hdfs_audit.name = org.apache.hadoop.hdfs.server.namenode.FSNamesystem.audit
logger.hdfs_audit.level = info
logger.hdfs_audit.appenderRef.RFAAUDIT.ref = RFAAUDIT
logger.hdfs_audit.additivity = false

# YARN RM audit
logger.rmaudit.name = org.apache.hadoop.yarn.server.resourcemanager.RMAuditLogger
logger.rmaudit.level = info
logger.rmaudit.appenderRef.RMAUDIT.ref = RMAUDIT
logger.rmaudit.additivity = false

# YARN NM audit
logger.nmaudit.name = org.apache.hadoop.yarn.server.nodemanager.NMAuditLogger
logger.nmaudit.level = info
logger.nmaudit.appenderRef.NMAUDIT.ref = NMAUDIT
logger.nmaudit.additivity = false

# MapReduce JobHistory audit
logger.hsaudit.name = org.apache.hadoop.mapreduce.v2.hs.HSAuditLogger
logger.hsaudit.level = info
logger.hsaudit.appenderRef.HSAUDIT.ref = HSAUDIT
logger.hsaudit.additivity = false

# HTTP access loggers
logger.accessnn.name = http.requests.namenode
logger.accessnn.level = info
logger.accessnn.appenderRef.AccessNN.ref = AccessNN
logger.accessnn.additivity = false

logger.accessdn.name = http.requests.datanode
logger.accessdn.level = info
logger.accessdn.appenderRef.AccessDN.ref = AccessDN
logger.accessdn.additivity = false

logger.accessrm.name = http.requests.resourcemanager
logger.accessrm.level = info
logger.accessrm.appenderRef.AccessRM.ref = AccessRM
logger.accessrm.additivity = false

logger.accessjh.name = http.requests.jobhistory
