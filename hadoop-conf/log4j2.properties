# Hadoop Log4j 2 configuration
# Hostname for SIEM: set via -Dlog4j.hostname=$(hostname) in hadoop-env.sh
# Log dir: LOG_DIR env (unified for all ecosystem components; default /logs)

# Root logger: level and appenders (default INFO, console)
rootLogger.level = info
rootLogger.appenderRef.console.ref = console

# Console appender
appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [${sys:log4j.hostname:-unknown}] %d{ISO8601} %p %c{2}: %m%n

# Rolling File Appender (RFA) - cap space usage at 5GB
appender.RFA.type = RollingFile
appender.RFA.name = RFA
appender.RFA.fileName = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}
appender.RFA.filePattern = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}.%i
appender.RFA.layout.type = PatternLayout
appender.RFA.layout.pattern = [${sys:log4j.hostname:-unknown}] %d{ISO8601} %p %c: %m%n
appender.RFA.policies.type = Policies
appender.RFA.policies.size.type = SizeBasedTriggeringPolicy
appender.RFA.policies.size.size = ${sys:hadoop.log.maxfilesize:-256MB}
appender.RFA.strategy.type = DefaultRolloverStrategy
appender.RFA.strategy.max = ${sys:hadoop.log.maxbackupindex:-20}

# Daily Rolling File Appender (DRFA)
appender.DRFA.type = RollingFile
appender.DRFA.name = DRFA
appender.DRFA.fileName = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}
appender.DRFA.filePattern = ${env:LOG_DIR:-/logs}/${sys:hadoop.log.file:-hadoop.log}.%d{yyyy-MM-dd}
appender.DRFA.layout.type = PatternLayout
appender.DRFA.layout.pattern = [${sys:log4j.hostname:-unknown}] %d{ISO8601} %p %c: %m%n
appender.DRFA.policies.type = Policies
appender.DRFA.policies.time.type = TimeBasedTriggeringPolicy
appender.DRFA.policies.time.interval = 1

# Null Appender (discards messages)
appender.NullAppender.type = Null

# Security appender (RFAS)
appender.RFAS.type = RollingFile
appender.RFAS.name = RFAS
appender.RFAS.fileName = ${env:LOG_DIR:-/logs}/${sys:hadoop.security.log.file:-SecurityAuth-audit.audit}
appender.RFAS.filePattern = ${env:LOG_DIR:-/logs}/${sys:hadoop.security.log.file:-SecurityAuth-audit.audit}.%i
appender.RFAS.layout.type = PatternLayout
appender.RFAS.layout.pattern = [${sys:log4j.hostname:-unknown}][Audit][RFAS] %d{ISO8601} %p %c: %m%n
appender.RFAS.policies.type = Policies
appender.RFAS.policies.size.type = SizeBasedTriggeringPolicy
appender.RFAS.policies.size.size = ${sys:hadoop.security.log.maxfilesize:-256MB}
appender.RFAS.strategy.type = DefaultRolloverStrategy
appender.RFAS.strategy.max = ${sys:hadoop.security.log.maxbackupindex:-20}

# Daily Rolling Security appender (DRFAS)
appender.DRFAS.type = RollingFile
appender.DRFAS.name = DRFAS
appender.DRFAS.fileName = ${env:LOG_DIR:-/logs}/${sys:hadoop.security.log.file:-SecurityAuth-audit.audit}
appender.DRFAS.filePattern = ${env:LOG_DIR:-/logs}/${sys:hadoop.security.log.file:-SecurityAuth-audit.audit}.%d{yyyy-MM-dd}
appender.DRFAS.layout.type = PatternLayout
appender.DRFAS.layout.pattern = [${sys:log4j.hostname:-unknown}][Audit][DRFAS] %d{ISO8601} %p %c: %m%n
appender.DRFAS.policies.type = Policies
appender.DRFAS.policies.time.type = TimeBasedTriggeringPolicy
appender.DRFAS.policies.time.interval = 1

# HDFS audit logging
appender.RFAAUDIT.type = RollingFile
appender.RFAAUDIT.name = RFAAUDIT
appender.RFAAUDIT.fileName = ${env:LOG_DIR:-/logs}/hdfs-audit-${sys:log4j.hostname:-unknown}.log
appender.RFAAUDIT.filePattern = ${env:LOG_DIR:-/logs}/hdfs-audit-${sys:log4j.hostname:-unknown}.log.%i
appender.RFAAUDIT.layout.type = PatternLayout
appender.RFAAUDIT.layout.pattern = [${sys:log4j.hostname:-unknown}][Audit][RFAAUDIT] %d{ISO8601} %p %c{2}: %m%n
appender.RFAAUDIT.policies.type = Policies
appender.RFAAUDIT.policies.size.type = SizeBasedTriggeringPolicy
appender.RFAAUDIT.policies.size.size = ${sys:hdfs.audit.log.maxfilesize:-256MB}
appender.RFAAUDIT.strategy.type = DefaultRolloverStrategy
appender.RFAAUDIT.strategy.max = ${sys:hdfs.audit.log.maxbackupindex:-20}

logger.hdfs_audit.name = org.apache.hadoop.hdfs.server.namenode.FSNamesystem.audit
logger.hdfs_audit.level = info
logger.hdfs_audit.appenderRef.RFAAUDIT.ref = RFAAUDIT
logger.hdfs_audit.additivity = false

