# Log4j 1.x (reload4j) config for Apache Hadoop 3.
# Used by apache/hadoop image; logs go to console and to /logs (mounted per service).

# Root: console + file so docker logs and on-disk logs match
log4j.rootLogger=INFO, CONSOLE, RFA

# Console (stdout)
log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
log4j.appender.CONSOLE.target=System.err
log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
log4j.appender.CONSOLE.layout.ConversionPattern=%d{ISO8601} %p %c{2}: %m%n

# Rolling file: daemon log on disk (each container has /logs mounted from ./logs/<service>)
log4j.appender.RFA=org.apache.log4j.RollingFileAppender
log4j.appender.RFA.File=/logs/hadoop.log
log4j.appender.RFA.MaxFileSize=256MB
log4j.appender.RFA.MaxBackupIndex=20
log4j.appender.RFA.layout=org.apache.log4j.PatternLayout
log4j.appender.RFA.layout.ConversionPattern=%d{ISO8601} %p %c: %m%n

# HDFS audit (referenced by hdfs-env.sh HDFS_AUDIT_LOGGER=INFO,RFAAUDIT)
log4j.appender.RFAAUDIT=org.apache.log4j.RollingFileAppender
log4j.appender.RFAAUDIT.File=/logs/hdfs-audit.log
log4j.appender.RFAAUDIT.MaxFileSize=256MB
log4j.appender.RFAAUDIT.MaxBackupIndex=20
log4j.appender.RFAAUDIT.layout=org.apache.log4j.PatternLayout
log4j.appender.RFAAUDIT.layout.ConversionPattern=%d{ISO8601} %p %c{2}: %m%n

# YARN RM audit
log4j.appender.RMAUDIT=org.apache.log4j.RollingFileAppender
log4j.appender.RMAUDIT.File=/logs/rm-audit.log
log4j.appender.RMAUDIT.MaxFileSize=256MB
log4j.appender.RMAUDIT.MaxBackupIndex=20
log4j.appender.RMAUDIT.layout=org.apache.log4j.PatternLayout
log4j.appender.RMAUDIT.layout.ConversionPattern=%d{ISO8601} %p %c{2}: %m%n

# YARN NM audit
log4j.appender.NMAUDIT=org.apache.log4j.RollingFileAppender
log4j.appender.NMAUDIT.File=/logs/nm-audit.log
log4j.appender.NMAUDIT.MaxFileSize=256MB
log4j.appender.NMAUDIT.MaxBackupIndex=20
log4j.appender.NMAUDIT.layout=org.apache.log4j.PatternLayout
log4j.appender.NMAUDIT.layout.ConversionPattern=%d{ISO8601} %p %c{2}: %m%n

# MapReduce JobHistory audit
log4j.appender.HSAUDIT=org.apache.log4j.RollingFileAppender
log4j.appender.HSAUDIT.File=/logs/hs-audit.log
log4j.appender.HSAUDIT.MaxFileSize=256MB
log4j.appender.HSAUDIT.MaxBackupIndex=20
log4j.appender.HSAUDIT.layout=org.apache.log4j.PatternLayout
log4j.appender.HSAUDIT.layout.ConversionPattern=%d{ISO8601} %p %c{2}: %m%n

# Loggers that use the audit appenders (daemons set these via -D...logger=INFO,APPENDER)
log4j.logger.org.apache.hadoop.hdfs.server.namenode.FSNamesystem.audit=INFO, RFAAUDIT
log4j.additivity.org.apache.hadoop.hdfs.server.namenode.FSNamesystem.audit=false
log4j.logger.org.apache.hadoop.yarn.server.resourcemanager.RMAuditLogger=INFO, RMAUDIT
log4j.additivity.org.apache.hadoop.yarn.server.resourcemanager.RMAuditLogger=false
log4j.logger.org.apache.hadoop.yarn.server.nodemanager.NMAuditLogger=INFO, NMAUDIT
log4j.additivity.org.apache.hadoop.yarn.server.nodemanager.NMAuditLogger=false
log4j.logger.org.apache.hadoop.mapreduce.v2.hs.HSAuditLogger=INFO, HSAUDIT
log4j.additivity.org.apache.hadoop.mapreduce.v2.hs.HSAuditLogger=false
