# Prometheus JMX Exporter config for MapReduce JobHistoryServer
# Use with: -javaagent:jmx_prometheus_javaagent.jar=9094:this-file
# See docs/JMX_EXPORTER_SETUP.md

lowercaseOutputName: true
lowercaseOutputLabelNames: true

whitelistObjectNames:
  - "java.lang:*"
  - "Hadoop:service=JobHistoryServer,name=*"
  - "Hadoop:service=JobTracker,name=*"
