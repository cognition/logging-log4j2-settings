#
# Spark Log4j2 configuration for Spark on YARN (no Hive)
# Syslog variant: logs to files AND syslog (local or remote)
# Log dir: LOG_DIR env (unified for all ecosystem components; default /logs)
#
# Activation: Set LOG4J_CONFIGURATION_FILE=file:/opt/spark/conf/log4j2-syslog.properties
#             or -Dlog4j.configurationFile=file:/opt/spark/conf/log4j2-syslog.properties
#
# Syslog params (optional): -Dsyslog.host, -Dsyslog.port, -Dsyslog.protocol, -Dsyslog.facility
#

rootLogger.level = info
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [${env:HOSTNAME:-unknown}] %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# Syslog appender (logs to local or remote syslog in addition to files)
appender.syslog.type = Syslog
appender.syslog.name = syslog
appender.syslog.host = ${sys:syslog.host:-localhost}
appender.syslog.port = ${sys:syslog.port:-514}
appender.syslog.protocol = ${sys:syslog.protocol:-UDP}
appender.syslog.facility = ${sys:syslog.facility:-LOCAL1}
appender.syslog.appName = spark-${env:HOSTNAME:-unknown}

# Spark application and scheduler - job submissions, lifecycle
logger.spark.name = org.apache.spark
logger.spark.level = info

# YARN - application submissions, resource allocation (who, what)
logger.yarn.name = org.apache.hadoop.yarn
logger.yarn.level = info

# Dedicated audit log file
appender.audit.type = RollingFile
appender.audit.name = audit
appender.audit.fileName = ${env:LOG_DIR:-/logs}/spark-audit.log
appender.audit.filePattern = ${env:LOG_DIR:-/logs}/spark-audit-%d{yyyy-MM-dd}.log
appender.audit.layout.type = PatternLayout
appender.audit.layout.pattern = [${env:HOSTNAME:-unknown}][Audit][Spark] %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex
appender.audit.policies.type = Policies
appender.audit.policies.time.type = TimeBasedTriggeringPolicy
appender.audit.policies.time.interval = 1

logger.audit.name = org.apache.spark
logger.audit.level = info
logger.audit.appenderRef.console.ref = console
logger.audit.appenderRef.audit.ref = audit
logger.audit.appenderRef.syslog.ref = syslog
logger.audit.additivity = false

# UI access logging (Spark History Server, driver UI)
appender.access.type = RollingFile
appender.access.name = access
appender.access.fileName = ${env:LOG_DIR:-/logs}/jetty-access.log
appender.access.filePattern = ${env:LOG_DIR:-/logs}/jetty-access-%d{yyyy-MM-dd}.log
appender.access.layout.type = PatternLayout
appender.access.layout.pattern = [${env:HOSTNAME:-unknown}][Access][JETTY] %m%n
appender.access.policies.type = Policies
appender.access.policies.time.type = TimeBasedTriggeringPolicy
appender.access.policies.time.interval = 1

logger.access.name = org.sparkproject.jetty.server.RequestLog
logger.access.level = info
logger.access.appenderRef.access.ref = access
logger.access.appenderRef.syslog.ref = syslog
logger.access.additivity = false

# All loggers at INFO for SIEM visibility
logger.repl.name = org.apache.spark.repl.Main
logger.repl.level = info
logger.jetty1.name = org.sparkproject.jetty
logger.jetty1.level = info
logger.jetty2.name = org.sparkproject.jetty.util.component.AbstractLifeCycle
logger.jetty2.level = info
logger.parquet1.name = org.apache.parquet
logger.parquet1.level = info
logger.parquet2.name = parquet
logger.parquet2.level = info
