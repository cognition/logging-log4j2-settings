#
# Spark Log4j2 configuration for Spark on YARN (no Hive)
# Logs who submits jobs, application lifecycle, and main actions
#

rootLogger.level = info
rootLogger.appenderRef.stdout.ref = console

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex

# Spark application and scheduler - job submissions, lifecycle
logger.spark.name = org.apache.spark
logger.spark.level = info

# YARN - application submissions, resource allocation (who, what)
logger.yarn.name = org.apache.hadoop.yarn
logger.yarn.level = info

# Dedicated audit log file
appender.audit.type = RollingFile
appender.audit.name = audit
appender.audit.fileName = /opt/spark/logs/spark-audit.log
appender.audit.filePattern = /opt/spark/logs/spark-audit-%d{yyyy-MM-dd}.log
appender.audit.layout.type = PatternLayout
appender.audit.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex
appender.audit.policies.type = Policies
appender.audit.policies.time.type = TimeBasedTriggeringPolicy
appender.audit.policies.time.interval = 1

logger.audit.name = org.apache.spark
logger.audit.level = info
logger.audit.appenderRef.console.ref = console
logger.audit.appenderRef.audit.ref = audit
logger.audit.additivity = false

# Reduce noise
logger.repl.name = org.apache.spark.repl.Main
logger.repl.level = warn
logger.jetty1.name = org.sparkproject.jetty
logger.jetty1.level = warn
logger.jetty2.name = org.sparkproject.jetty.util.component.AbstractLifeCycle
logger.jetty2.level = error
logger.parquet1.name = org.apache.parquet
logger.parquet1.level = error
logger.parquet2.name = parquet
logger.parquet2.level = error
