logger.accessjh.appenderRef.AccessJH.ref = AccessJH
logger.accessjh.additivity = false

logger.accessnm.name = http.requests.nodemanager
logger.accessnm.level = info
logger.accessnm.appenderRef.AccessNM.ref = AccessNM
logger.accessnm.additivity = false

