# KMS Log4j 2 configuration
# Log dir: LOG_DIR env (default $HADOOP_HOME/logs or /hadoop/logs)

rootLogger.level = info
rootLogger.appenderRef.kms.ref = kms

appender.kms.type = RollingFile
appender.kms.name = kms
appender.kms.fileName = ${env:LOG_DIR:-${sys:kms.log.dir:-/hadoop/logs}}/kms.log
appender.kms.filePattern = ${env:LOG_DIR:-${sys:kms.log.dir:-/hadoop/logs}}/kms-%d{yyyy-MM-dd}.log
appender.kms.layout.type = PatternLayout
appender.kms.layout.pattern = %d{ISO8601} %-5p %c{1} - %m%n
appender.kms.policies.type = Policies
appender.kms.policies.time.type = TimeBasedTriggeringPolicy
appender.kms.policies.time.interval = 1
appender.kms.append = true

appender.kms_audit.type = RollingFile
appender.kms_audit.name = kms-audit
appender.kms_audit.fileName = ${env:LOG_DIR:-${sys:kms.log.dir:-/hadoop/logs}}/kms-audit.log
appender.kms_audit.filePattern = ${env:LOG_DIR:-${sys:kms.log.dir:-/hadoop/logs}}/kms-audit-%d{yyyy-MM-dd}.log
appender.kms_audit.layout.type = PatternLayout
appender.kms_audit.layout.pattern = %d{ISO8601} %m%n
appender.kms_audit.policies.type = Policies
appender.kms_audit.policies.time.type = TimeBasedTriggeringPolicy
appender.kms_audit.policies.time.interval = 1
appender.kms_audit.append = true

logger.kms_audit.name = kms-audit
logger.kms_audit.level = info
logger.kms_audit.appenderRef.kms_audit.ref = kms-audit
logger.kms_audit.additivity = false

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = info

logger.wadl.name = com.sun.jersey.server.wadl.generators.WadlGeneratorJAXBGrammarGenerator
logger.wadl.level = off

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = info

logger.curator.name = org.apache.curator
logger.curator.level = info

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = info
