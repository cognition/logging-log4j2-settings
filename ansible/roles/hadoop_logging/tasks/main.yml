---
# hadoop_logging role tasks
# Deploy configs, create log dirs, apply toggles

- name: Ensure deploy path exists
  ansible.builtin.file:
    path: "{{ hadoop_logging_deploy_path }}"
    state: directory
    mode: "0755"

- name: Ensure hadoop-conf exists
  ansible.builtin.file:
    path: "{{ hadoop_logging_deploy_path }}/hadoop-conf"
    state: directory
    mode: "0755"

- name: Create log directory
  ansible.builtin.file:
    path: "{{ hadoop_logging_deploy_path }}/logs"
    state: directory
    mode: "0777"

- name: Ensure logs/.gitkeep exists
  ansible.builtin.copy:
    content: ""
    dest: "{{ hadoop_logging_deploy_path }}/logs/.gitkeep"
    force: false

- name: Deploy hadoop-conf
  ansible.builtin.copy:
    src: "{{ hadoop_logging_config_source }}/hadoop-conf/"
    dest: "{{ hadoop_logging_deploy_path }}/hadoop-conf/"
    mode: "0644"
  when: hadoop_logging_copy_configs | bool and hadoop_logging_config_source | length > 0

- name: Deploy spark-conf
  ansible.builtin.copy:
    src: "{{ hadoop_logging_config_source }}/spark-conf/"
    dest: "{{ hadoop_logging_deploy_path }}/spark-conf/"
    mode: "0644"
  when: hadoop_logging_copy_configs | bool and hadoop_logging_config_source | length > 0

- name: Apply MapReduce JobHistory audit toggle to mapred-env.sh
  ansible.builtin.template:
    src: mapred-env.sh.j2
    dest: "{{ hadoop_logging_deploy_path }}/hadoop-conf/mapred-env.sh"
    mode: "0644"
  notify: Restart jobhistoryserver

- name: Deploy docker-compose syslog override when syslog enabled
  ansible.builtin.template:
    src: docker-compose-syslog-override.yml.j2
    dest: "{{ hadoop_logging_deploy_path }}/docker-compose.syslog.yml"
    mode: "0644"
  when: hadoop_logging_syslog_enabled | bool and hadoop_logging_docker_deploy | bool

- name: Notify handlers on config change
  ansible.builtin.meta: flush_handlers
