# HTTPFS Log4j 2 configuration
# Log dir: LOG_DIR env (default $HADOOP_HOME/logs or /hadoop/logs)

rootLogger.level = info
rootLogger.appenderRef.httpfs.ref = httpfs

appender.httpfs.type = RollingFile
appender.httpfs.name = httpfs
appender.httpfs.fileName = ${env:LOG_DIR:-${sys:httpfs.log.dir:-/hadoop/logs}}/httpfs.log
appender.httpfs.filePattern = ${env:LOG_DIR:-${sys:httpfs.log.dir:-/hadoop/logs}}/httpfs-%d{yyyy-MM-dd}.log
appender.httpfs.layout.type = PatternLayout
appender.httpfs.layout.pattern = %d{ISO8601} %5p %c{1} [%X{hostname}][%X{user}:%X{doAs}] %X{op} %m%n
appender.httpfs.policies.type = Policies
appender.httpfs.policies.time.type = TimeBasedTriggeringPolicy
appender.httpfs.policies.time.interval = 1
appender.httpfs.append = true

appender.httpfsaudit.type = RollingFile
appender.httpfsaudit.name = httpfsaudit
appender.httpfsaudit.fileName = ${env:LOG_DIR:-${sys:httpfs.log.dir:-/hadoop/logs}}/httpfs-audit.log
appender.httpfsaudit.filePattern = ${env:LOG_DIR:-${sys:httpfs.log.dir:-/hadoop/logs}}/httpfs-audit-%d{yyyy-MM-dd}.log
appender.httpfsaudit.layout.type = PatternLayout
appender.httpfsaudit.layout.pattern = %d{ISO8601} %5p [%X{hostname}][%X{user}:%X{doAs}] %X{op} %m%n
appender.httpfsaudit.policies.type = Policies
appender.httpfsaudit.policies.time.type = TimeBasedTriggeringPolicy
appender.httpfsaudit.policies.time.interval = 1
appender.httpfsaudit.append = true

logger.httpfsaudit.name = httpfsaudit
logger.httpfsaudit.level = info
logger.httpfsaudit.appenderRef.httpfsaudit.ref = httpfsaudit
logger.httpfsaudit.additivity = false

logger.httpfs_server.name = org.apache.hadoop.fs.http.server
logger.httpfs_server.level = info
logger.httpfs_server.appenderRef.httpfs.ref = httpfs

logger.hadoop_lib.name = org.apache.hadoop.lib
logger.hadoop_lib.level = info
logger.hadoop_lib.appenderRef.httpfs.ref = httpfs
