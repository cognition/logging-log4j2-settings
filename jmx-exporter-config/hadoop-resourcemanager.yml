# Prometheus JMX Exporter config for YARN ResourceManager
# Use with: -javaagent:jmx_prometheus_javaagent.jar=9092:this-file
# See docs/JMX_EXPORTER_SETUP.md

lowercaseOutputName: true
lowercaseOutputLabelNames: true

whitelistObjectNames:
  - "java.lang:*"
  - "Hadoop:service=ResourceManager,name=*"
  - "Hadoop:service=ResourceManager,sub=*"
