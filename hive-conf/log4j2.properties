status = info
name = HiveLogging

rootLogger.level = info
rootLogger.appenderRef.console.ref = CONSOLE

appender.CONSOLE.type = Console
appender.CONSOLE.name = CONSOLE
appender.CONSOLE.target = SYSTEM_ERR
appender.CONSOLE.layout.type = PatternLayout
appender.CONSOLE.layout.pattern = [${env:LOG_TAG_HOSTNAME:-${env:HOSTNAME:-unknown}}]${env:LOG_TAG_APPLICATION:-}${env:LOG_TAG_ACTION:-}${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n

# Hive application log
appender.HIVEAPP.type = RollingFile
appender.HIVEAPP.name = HIVEAPP
appender.HIVEAPP.fileName = ${env:LOG_DIR:-/logs}/hive-app.log
appender.HIVEAPP.filePattern = ${env:LOG_DIR:-/logs}/hive-app-%d{yyyy-MM-dd}.log
appender.HIVEAPP.layout.type = PatternLayout
appender.HIVEAPP.layout.pattern = [${env:LOG_TAG_HOSTNAME:-${env:HOSTNAME:-unknown}}]${env:LOG_TAG_APPLICATION:-}[Hive]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.HIVEAPP.policies.type = Policies
appender.HIVEAPP.policies.time.type = TimeBasedTriggeringPolicy
appender.HIVEAPP.policies.time.interval = 1

# Hive audit log (queries, metastore operations)
appender.HIVEAUDIT.type = RollingFile
appender.HIVEAUDIT.name = HIVEAUDIT
appender.HIVEAUDIT.fileName = ${env:LOG_DIR:-/logs}/hive-audit.log
appender.HIVEAUDIT.filePattern = ${env:LOG_DIR:-/logs}/hive-audit-%d{yyyy-MM-dd}.log
appender.HIVEAUDIT.layout.type = PatternLayout
appender.HIVEAUDIT.layout.pattern = [${env:LOG_TAG_HOSTNAME:-${env:HOSTNAME:-unknown}}]${env:LOG_TAG_APPLICATION:-}[Audit]${env:LOG_TAG_SECURITY:-}${env:LOG_TAG_CUSTOM:-} %d{ISO8601} %p %c{2}: %m%n
appender.HIVEAUDIT.policies.type = Policies
appender.HIVEAUDIT.policies.time.type = TimeBasedTriggeringPolicy
appender.HIVEAUDIT.policies.time.interval = 1

logger.hive.name = org.apache.hive
logger.hive.level = info
logger.hive.appenderRef.HIVEAPP.ref = HIVEAPP
logger.hive.additivity = false

logger.hiveaudit.name = org.apache.hadoop.hive.ql.audit
logger.hiveaudit.level = info
logger.hiveaudit.appenderRef.HIVEAUDIT.ref = HIVEAUDIT
logger.hiveaudit.additivity = false

