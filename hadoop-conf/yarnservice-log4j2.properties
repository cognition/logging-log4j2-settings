# Security debugging
# logger.hadoop_security.name = org.apache.hadoop.security
# logger.hadoop_security.level = debug

logger.native.name = org.apache.hadoop.util.NativeCodeLoader
logger.native.level = error

logger.hdfs.name = org.apache.hadoop.hdfs
logger.hdfs.level = warn

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = warn

logger.curator_state.name = org.apache.curator.framework.state
logger.curator_state.level = error

logger.curator_impl.name = org.apache.curator.framework.impl
logger.curator_impl.level = warn
