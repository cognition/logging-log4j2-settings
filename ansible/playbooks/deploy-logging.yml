---
# Deploy Hadoop ecosystem logging configs
# Usage:
#   Local (deploy to project root):
#     ansible-playbook -i localhost, -c local ansible/playbooks/deploy-logging.yml
#
#   Remote (deploy to target host):
#     ansible-playbook -i inventory.yml ansible/playbooks/deploy-logging.yml
#
#   With MapReduce audit enabled:
#     ansible-playbook ... -e hadoop_logging_mapreduce_hs_audit=INFO
#
#   With syslog:
#     ansible-playbook ... -e hadoop_logging_syslog_enabled=true -e syslog_host=logserver.example.com

- name: Deploy Hadoop logging configs
  hosts: all
  become: false
  vars:
    # Config source: path on control node (project root when run from repo)
    hadoop_logging_config_source: "{{ playbook_dir }}/../../"
    # Deploy path: where configs go on target (project root for local)
    hadoop_logging_deploy_path: "{{ playbook_dir }}/../../"
    hadoop_logging_docker_deploy: true
  roles:
    - hadoop_logging
