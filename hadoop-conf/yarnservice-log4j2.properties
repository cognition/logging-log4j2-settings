# YARN Slider Application Master Log4j 2 configuration

rootLogger.level = info
rootLogger.appenderRef.amlog.ref = amlog

# Log rotation based on size (256MB) with a max of 20 backup files
appender.amlog.type = RollingFile
appender.amlog.name = amlog
appender.amlog.fileName = ${env:LOG_DIR:-${sys:LOG_DIR:-/hadoop/logs}}/serviceam.log
appender.amlog.filePattern = ${env:LOG_DIR:-${sys:LOG_DIR:-/hadoop/logs}}/serviceam-%i.log
appender.amlog.layout.type = PatternLayout
appender.amlog.layout.pattern = %d{ISO8601} [%t] %-5p %c{2} - %m%n
appender.amlog.policies.type = Policies
appender.amlog.policies.size.type = SizeBasedTriggeringPolicy
appender.amlog.policies.size.size = 256MB
appender.amlog.strategy.type = DefaultRolloverStrategy
appender.amlog.strategy.max = 20

appender.stderr.type = Console
appender.stderr.name = stderr
appender.stderr.target = SYSTEM_ERR
appender.stderr.layout.type = PatternLayout
appender.stderr.layout.pattern = %d{ISO8601} [%t] %-5p %c{2} - %m%n

appender.subprocess.type = Console
appender.subprocess.name = subprocess
appender.subprocess.layout.type = PatternLayout
appender.subprocess.layout.pattern = [%c{1}]: %m%n

# YARN service framework
# logger.yarn_service.name = org.apache.hadoop.yarn.service
# logger.yarn_service.level = debug

# YARN operations
# logger.yarn_client.name = org.apache.hadoop.yarn.client
