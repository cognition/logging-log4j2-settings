appender.DNMETRICSRFA.policies.type = Policies
appender.DNMETRICSRFA.policies.size.type = SizeBasedTriggeringPolicy
appender.DNMETRICSRFA.policies.size.size = 64MB
appender.DNMETRICSRFA.strategy.type = DefaultRolloverStrategy
