appender.NNMETRICSRFA.policies.size.size = 64MB
appender.NNMETRICSRFA.strategy.type = DefaultRolloverStrategy
appender.NNMETRICSRFA.strategy.max = 1

logger.nnmetrics.name = NameNodeMetricsLog
logger.nnmetrics.level = ${sys:namenode.metrics.logger:-OFF}
logger.nnmetrics.appenderRef.NNMETRICSRFA.ref = NNMETRICSRFA
logger.nnmetrics.additivity = false

