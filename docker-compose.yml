# Docker Compose using only official Apache images.
# Hadoop: apache/hadoop:3.4  |  Spark: apache/spark:3.5.6  |  Hive: apache/hive:4.0.0
#
# Ensure hadoop-conf contains core-site.xml and hdfs-site.xml (and optionally
# mapred-site.xml, yarn-site.xml) so HDFS/YARN can find namenode and resourcemanager.
# See docs or Apache Hadoop documentation for cluster configuration.

name: hadoop-logging-apache

services:
  log-init:
    image: busybox:latest
    volumes:
      - ./logs:/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mkdir -p
        /logs/namenode
        /logs/hadoopnode
        /logs/resourcemanager
        /logs/jobhistoryserver
        /logs/sparkhistoryserver
        /logs/spark-client
        /logs/hive
        /logs/hdfs-container-logs
        && chmod -R 777 /logs
        && exit 0
    restart: "no"

  namenode:
    image: apache/hadoop:3.4
    hostname: namenode
    user: "0"
    init: true
    restart: always
    working_dir: /opt/hadoop
    command:
      - /bin/bash
      - -c
      - |
        if [ ! -f /opt/hadoop/dfs/name/current/VERSION ]; then
          echo "Formatting NameNode (first run or empty volume)..."
          bin/hdfs namenode -format -force
        fi
        exec bin/hdfs namenode
    ports:
      - "9870:9870"
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs/namenode:/logs
      - namenode:/opt/hadoop/dfs/name
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      LOG_DIR: /logs
    depends_on:
      log-init:
        condition: service_completed_successfully

  datanode:
    image: apache/hadoop:3.4
    hostname: hadoopnode
    user: "0"
    init: true
    restart: always
    ipc: shareable
    working_dir: /opt/hadoop
    command: ["bin/hdfs", "datanode"]
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs/hadoopnode:/logs
      - hadoopnode:/opt/hadoop/dfs/data
      - dnsocket:/run/hadoop-hdfs
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      LOG_DIR: /logs
    depends_on:
      log-init:
        condition: service_completed_successfully
      namenode:
        condition: service_started

  resourcemanager:
    image: apache/hadoop:3.4
    hostname: resourcemanager
    user: "0"
    init: true
    restart: always
    working_dir: /opt/hadoop
    command: ["bin/yarn", "resourcemanager"]
    ports:
      - "8088:8088"
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs/resourcemanager:/logs
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      LOG_DIR: /logs
    depends_on:
      log-init:
        condition: service_completed_successfully
      namenode:
        condition: service_started

  nodemanager:
    image: apache/hadoop:3.4
    user: "0"
    init: true
    restart: always
    network_mode: service:datanode
    ipc: service:datanode
    working_dir: /opt/hadoop
    command: ["bin/yarn", "nodemanager"]
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs/hadoopnode:/logs
      - hadoopnode:/opt/hadoop/dfs/data
      - dnsocket:/run/hadoop-hdfs
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      LOG_DIR: /logs
    depends_on:
      namenode:
        condition: service_started
      datanode:
        condition: service_started
      resourcemanager:
        condition: service_started

  jobhistoryserver:
    image: apache/hadoop:3.4
    hostname: jobhistoryserver
    user: "0"
    init: true
    restart: always
    working_dir: /opt/hadoop
    command: ["bin/mapred", "historyserver"]
    ports:
      - "19888:19888"
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs/jobhistoryserver:/logs
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      LOG_DIR: /logs
    depends_on:
      namenode:
        condition: service_started
      resourcemanager:
        condition: service_started
      datanode:
        condition: service_started

  spark-history:
    image: apache/spark:3.5.6
    hostname: sparkhistoryserver
    init: true
    restart: always
    ports:
      - "18080:18080"
    volumes:
      - ./hadoop-conf:/opt/spark/conf/hadoop:ro
      - ./spark-conf:/opt/spark/conf:ro
      - ./logs/sparkhistoryserver:/logs
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      LOG_DIR: /logs
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      namenode:
        condition: service_started
      resourcemanager:
        condition: service_started
      datanode:
        condition: service_started

  spark-client:
    image: apache/spark:3.5.6
    hostname: spark-client
    init: true
    restart: always
    working_dir: /opt/spark/work-dir
    command: ["sleep", "infinity"]
    ports:
      - "4040:4040"
    volumes:
      - ./spark-conf:/opt/spark/conf
      - ./hadoop-conf:/opt/spark/conf/hadoop:ro
      - ./logs/spark-client:/logs
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      LOG_DIR: /logs

  hive-metastore:
    image: apache/hive:4.0.0
    hostname: hive-metastore
    init: true
    restart: always
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./hive-conf:/opt/hive/conf:ro
      - ./logs/hive:/logs
    environment:
      LOG_DIR: /logs
      HIVE_CONF_DIR: /opt/hive/conf
      SERVICE_NAME: metastore
    depends_on:
      namenode:
        condition: service_started

  hive-server:
    image: apache/hive:4.0.0
    hostname: hiveserver2
    init: true
    restart: always
    ports:
      - "10000:10000"
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./hive-conf:/opt/hive/conf:ro
      - ./logs/hive:/logs
    environment:
      LOG_DIR: /logs
      HIVE_CONF_DIR: /opt/hive/conf
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
      IS_RESUME: "true"
    depends_on:
      hive-metastore:
        condition: service_started

  bootstrap:
    image: apache/hadoop:3.4
    hostname: bootstrap
    user: "0"
    init: true
    restart: "no"
    working_dir: /opt/hadoop
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        for i in $(seq 1 60); do
          if bin/hdfs dfs -ls / >/dev/null 2>&1; then break; fi;
          echo "Waiting for HDFS... ($i/60)"; sleep 5;
        done
        && bin/hdfs dfs -mkdir -p /tmp /spark-history /user/root /user/spark /user/hive/warehouse
        && bin/hdfs dfs -chmod 1777 /tmp
        && bin/hdfs dfs -chmod -R 777 /user /spark-history /user/hive
        && echo "Bootstrap done."
        || (echo "Bootstrap failed."; exit 1)
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    depends_on:
      namenode:
        condition: service_started
      datanode:
        condition: service_started
      log-init:
        condition: service_completed_successfully

  hdfs-log-sync:
    image: apache/hadoop:3.4
    hostname: hdfs-log-sync
    init: true
    restart: unless-stopped
    working_dir: /opt/hadoop
    volumes:
      - ./hadoop-conf:/opt/hadoop/etc/hadoop:ro
      - ./logs:/logs
      - ./scripts:/scripts:ro
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HADOOP_BIN: /opt/hadoop/bin/hdfs
      HDFS_LOG_DIR: /tmp/logs
      OUTPUT_DIR: /logs/hdfs-container-logs
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "while true; do bash /scripts/sync-hdfs-logs-to-local.sh; sleep 300; done"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      namenode:
        condition: service_started

volumes:
  dnsocket:
  hadoopnode:
  namenode:
