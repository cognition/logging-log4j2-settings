# Apache Spark 3.5.6 on YARN (no Hive)
# Mounted conf and logs for logging practice
# Based on hadoop-sandbox structure

name: spark-hadoop

services:
  log-init:
    image: busybox:latest
    volumes:
      - ./logs:/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /logs/namenode /logs/hadoopnode /logs/resourcemanager /logs/jobhistoryserver /logs/sparkhistoryserver /logs/spark-client /logs/hdfs-container-logs
        chmod -R 777 /logs
        touch /logs/resourcemanager/rm-audit.log && chmod 666 /logs/resourcemanager/rm-audit.log
        exit 0
    restart: "no"

  namenode:
    image: ghcr.io/hadoop-sandbox/hadoop-hdfs-namenode:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./logs/namenode:/logs
      - namenode:/data
    depends_on:
      log-init:
        condition: service_completed_successfully
    environment:
      LOG_DIR: /logs
      HADOOP_OPTS: "-Dlog4j.configurationFile=file:/hadoop/etc/hadoop/log4j2.properties"
      HADOOP_DAEMON_ROOT_LOGGER: "INFO,RFA"
    restart: always
    init: true
    hostname: namenode
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:9870/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m

  datanode:
    image: ghcr.io/hadoop-sandbox/hadoop-hdfs-datanode:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./logs/hadoopnode:/logs
      - hadoopnode:/data
      - dnsocket:/run/hadoop-hdfs
    environment:
      LOG_DIR: /logs
      HADOOP_OPTS: "-Dlog4j.configurationFile=file:/hadoop/etc/hadoop/log4j2.properties"
      HADOOP_DAEMON_ROOT_LOGGER: "INFO,RFA"
    restart: always
    init: true
    ipc: shareable
    hostname: hadoopnode
    depends_on:
      log-init:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:9864/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m

  resourcemanager:
    image: ghcr.io/hadoop-sandbox/hadoop-yarn-resourcemanager:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./logs/resourcemanager:/logs
    environment:
      LOG_DIR: /logs
      HADOOP_OPTS: "-Dlog4j.configurationFile=file:/hadoop/etc/hadoop/log4j2.properties"
      YARN_ROOT_LOGGER: "INFO,RFA"
    restart: always
    init: true
    hostname: resourcemanager
    depends_on:
      namenode:
        condition: service_healthy
      log-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://resourcemanager:8088/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
    ports:
      - "8088:8088"  # YARN ResourceManager UI

  nodemanager:
    image: ghcr.io/hadoop-sandbox/hadoop-yarn-nodemanager-spark:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./logs/hadoopnode:/logs
      - hadoopnode:/data
      - dnsocket:/run/hadoop-hdfs
    environment:
      LOG_DIR: /logs
      HADOOP_OPTS: "-Dlog4j.configurationFile=file:/hadoop/etc/hadoop/log4j2.properties"
      YARN_ROOT_LOGGER: "INFO,RFA"
    restart: always
    init: true
    network_mode: service:datanode
    ipc: service:datanode
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
      - SYSLOG
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8042/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m

  jobhistoryserver:
    image: ghcr.io/hadoop-sandbox/hadoop-mapred-jobhistoryserver:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
      - ./logs/jobhistoryserver:/logs
    environment:
      LOG_DIR: /logs
      HADOOP_OPTS: "-Dlog4j.configurationFile=file:/hadoop/etc/hadoop/log4j2.properties"
      HADOOP_DAEMON_ROOT_LOGGER: "INFO,RFA"
    restart: always
    init: true
    hostname: jobhistoryserver
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
      datanode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://jobhistoryserver:19888/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
    ports:
      - "19888:19888"  # JobHistory UI

  spark-history:
    image: apache/spark:3.5.6
    volumes:
      - ./hadoop-conf:/opt/spark/conf/hadoop:ro
      - ./spark-conf:/opt/spark/conf:ro
      - ./logs/sparkhistoryserver:/logs
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      LOG_DIR: /logs
      HOSTNAME: sparkhistoryserver
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    restart: always
    init: true
    hostname: sparkhistoryserver
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
      datanode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://sparkhistoryserver:18080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2m
    ports:
      - "18080:18080"  # Spark History Server

  hdfs-log-sync:
    image: apache/spark:3.5.6
    volumes:
      - ./hadoop-conf:/opt/spark/conf/hadoop:ro
      - ./logs:/logs
      - ./scripts:/scripts:ro
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      HDFS_LOG_DIR: /tmp/logs
      OUTPUT_DIR: /logs/hdfs-container-logs
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "while true; do /scripts/sync-hdfs-logs-to-local.sh; sleep 300; done"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
    restart: unless-stopped

  bootstrap:
    image: ghcr.io/hadoop-sandbox/hadoop-hdfs-namenode:latest
    volumes:
      - ./hadoop-conf:/hadoop/etc/hadoop:ro
    user: hdfs
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "hdfs dfs -mkdir -p /spark-history /user/root /user/spark && hdfs dfs -chmod -R 777 /user /spark-history 2>/dev/null || true; exit 0"
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      log-init:
        condition: service_completed_successfully
    restart: "no"

  spark-client:
    image: apache/spark:3.5.6
    hostname: spark-client
    volumes:
      - ./spark-conf:/opt/spark/conf
      - ./hadoop-conf:/opt/spark/conf/hadoop:ro
      - ./logs/spark-client:/logs
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      LOG_DIR: /logs
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      HOSTNAME: spark-client
    working_dir: /opt/spark/work-dir
    command: ["sleep", "infinity"]
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_healthy
      datanode:
        condition: service_healthy
      nodemanager:
        condition: service_healthy
    networks:
      - default
    ports:
      - "4040:4040"  # Spark driver UI (when job runs)

networks:
  default:
    name: spark-hadoop_default

volumes:
  dnsocket:
  hadoopnode:
  namenode:
